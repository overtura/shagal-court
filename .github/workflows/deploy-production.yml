name: Deploy Vercel Production

on:
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VERCEL_CLI_VERSION: 50.44.0
      VERCEL_ORG_ID: team_s79GmaFfXOcCacknEEkZyEaq
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Require Vercel token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN secret" >&2
            exit 1
          fi

      - name: Link Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel link --yes --project shagal-court --scope okorions-projects --token="$VERCEL_TOKEN"

      - name: Pull production settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        id: deploy
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
